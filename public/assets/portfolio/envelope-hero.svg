<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="env" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#5f5f63"/>
      <stop offset="100%" stop-color="#2f2f35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-opacity=".28"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="3"/>
      <feColorMatrix type="saturate" values="0"/>
