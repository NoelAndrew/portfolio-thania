    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="80" y="90" width="1440" height="690" rx="8" fill="url(#env)"/>
    <path d="M80 185 Q800 -40 1520 185 L1520 90 L80 90 Z" fill="#77777c" fill-opacity=".36"/>
    <path d="M80 185 L800 515 L1520 185 L1520 780 L80 780 Z" fill="#1f1f25" fill-opacity=".14"/>
    <path d="M80 185 L800 515 L1520 185" fill="none" stroke="#a0a0a7" stroke-opacity=".15" stroke-width="2"/>
    <rect x="80" y="90" width="1440" height="690" rx="8" filter="url(#grain)"/>
  </g>
</svg>